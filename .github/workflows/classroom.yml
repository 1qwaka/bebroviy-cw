  deploy-and-test:
    name: Deploy to Minikube & Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Minikube
        uses: manusa/actions-setup-minikube@v2.14.0
        with:
          minikube version: 'v1.32.0'
          kubernetes version: 'v1.28.0'
          driver: docker

      - name: Install Just
        uses: extractions/setup-just@v3

      - name: Setup /etc/hosts
        run: echo "127.0.0.1 my-app.local" | sudo tee -a /etc/hosts

      - name: Start Minikube & Enable Ingress
        run: |
          echo "=== Start Minikube ==="
          minikube start
          minikube addons enable ingress

      - name: Wait for Ingress Controller
        run: |
          echo "=== Wait for ingress-nginx controller ==="
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=180s
      
      - name: Create Secrets
        run: |
          echo "=== Generating Secrets ==="
          kubectl create secret generic my-secret \
            --from-literal=DB_USER=program \
            --from-literal=DB_PASS=test
          
          kubectl create secret generic oidc-data \
            --from-literal=OIDC_CLIENT_ID=gateway-client \
            --from-literal=OIDC_CLIENT_SECRET=gateway-secret

          PRIV_B64=$(base64 -w 0 v2/test-private.pem)
          PUB_B64=$(base64 -w 0 v2/test-public.pem)
          
          kubectl create secret generic idp-rsa-keys \
            --from-literal=JWT_PRIVATE_KEY_BASE64=$PRIV_B64 \
            --from-literal=JWT_PUBLIC_KEY_BASE64=$PUB_B64

      - name: Install PostgreSQL
        run: |
          echo "=== Install PostgreSQL ==="
          helm repo add bitnami https://charts.bitnami.com/bitnami
          
          kubectl create secret generic postgres-secret --from-literal=postgres-password=test --from-literal=password=test
          kubectl create configmap postgres-init --from-file=./postgres/
          
          helm install postgres bitnami/postgresql --set primary.initdb.scriptsConfigMap=postgres-init
          
          echo "Wait for PostgreSQL to be ready..."
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=postgresql --timeout=180s

      - name: Install Kafka
        run: |
          echo "=== Install Kafka ==="
          helm install kafka ./charts/kafka
          echo "Wait for Kafka to be ready..."
          kubectl wait --for=condition=ready pod -l app=kafka --timeout=180s

      - name: Install Microservices
        run: |
          echo "=== Deploying services via Helm ==="
          just install-all-services

      - name: Wait for Microservices
        run: |
          echo "=== Waiting for App Pods ==="
          kubectl wait --for=condition=ready pod -l app=idp-app --timeout=30s
          kubectl wait --for=condition=ready pod -l app=loyalty-app --timeout=30s
          kubectl wait --for=condition=ready pod -l app=payment-app --timeout=30s
          kubectl wait --for=condition=ready pod -l app=reservation-app --timeout=30s
          kubectl wait --for=condition=ready pod -l app=statistics-app --timeout=30s
          kubectl wait --for=condition=ready pod -l app=gateway-app --timeout=30s

      - name: Apply & Wait Ingress
        run: |
          kubectl apply -f ./k8s/ingress.yaml
          sleep 10
          kubectl wait --namespace default \
            --for=condition=ready pod \
            --selector=app=gateway-app \
            --timeout=120s

      - name: Debug kubeconfig
        run: |
          echo "KUBECONFIG=$KUBECONFIG"
          ls -la ~/.kube/ || echo "no .kube dir"
          sudo kubectl config view || echo "sudo cant read config"
          
      - name: Setup Port Forwarding
        run: |
          echo "=== Setup port forwarding to Ingress on port 8080 ==="
          KUBECONFIG=/home/runner/.kube/config \
          sudo --preserve-env=KUBECONFIG \
          kubectl port-forward service/ingress-nginx-controller -n ingress-nginx 80:80 &
          echo $! > /tmp/pf-ingress.pid

          echo "=== Setup port forwarding to IDP on port 8090 ==="
          kubectl port-forward svc/idp-svc 8090:80 &
          echo $! > /tmp/pf-idp.pid

          sleep 10
          
      - name: Run Postman Tests
        uses: matt-ball/newman-action@master
        with:
          collection: v2/postman/tests.json
          envVar: |
            [
              {"key":"serviceUrl","value":"http://my-app.local"},
              {"key":"idpUrl","value":"http://my-app.local"},
              {"key":"clientId","value":"gateway-client"},
              {"key":"clientSecret","value":"gateway-secret"},
              {"key":"redirectUri","value":"http://my-app.local/callback"}
            ]
          delayRequest: 500
          reporters: '[ "cli" ]'

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Cluster state ==="
          kubectl get pods -o wide
          kubectl get events --sort-by='.lastTimestamp' | tail -30


          for pod in $(kubectl get pods -l app -o jsonpath='{.items[*].metadata.name}'); do
            echo "=== Logs for pod: $pod ==="
            kubectl logs $pod || true
            echo "=== End logs for $pod ==="
            echo "=== Describe for pod: $pod ==="
            kubectl describe pod $pod || true
            echo "=== End describe for pod: $pod ==="
            echo
          done

          echo ""
          echo "=== Statistics pod deep debug ==="
          
          kubectl get pod -l app=statistics-app -o yaml
          
          kubectl describe pod -l app=statistics-app
          
          kubectl logs -l app=statistics-app --all-containers=true || true
          
          kubectl logs -l app=statistics-app --all-containers=true --previous || true

      - name: Cleanup Port Forwarding
        if: always()
        run: |
          for pidfile in /tmp/pf-ingress.pid /tmp/pf-idp.pid; do
            if [ -f "$pidfile" ]; then
              kill $(cat "$pidfile") 2>/dev/null || true
              rm -f "$pidfile"
            fi
          done