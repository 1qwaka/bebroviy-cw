apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.name }}-app
  template:
    metadata:
      labels:
        app: {{ .Values.name }}-app
    spec:
      containers:
        - name: {{ .Values.name }}-app-container
          image: {{ .Values.image }}
          ports:
            - containerPort: {{ .Values.containerPort }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          envFrom:
            - secretRef:
            # бд
                name: my-secret
            {{- if .Values.secretRefs }}
            {{- range $val := .Values.secretRefs }}
            - secretRef:
                name: {{ $val | quote }}
            {{- end }}
            {{- end }}