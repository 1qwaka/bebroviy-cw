{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: 
  name: {{ .Values.name }}-ingress
spec:
  rules: 
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend: 
              service:
                name: {{ .Values.name }}-svc
                port:
                  number: 80
{{- end }}